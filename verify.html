<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - BTEC Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="css-shape shape-1" style="--rot: -35deg;"></div>
    <div class="css-shape shape-2" style="--rot: 20deg;"></div>
    <div class="css-shape shape-3" style="--rot: 45deg;"></div>
    <div class="css-shape shape-4"></div>

    <div class="glass-card" style="text-align: center;">
        
        <!-- أيقونة الإيميل -->
        <i class="fas fa-envelope-open-text" style="font-size: 60px; color: #4facfe; margin-bottom: 20px;"></i>
        
        <h2 class="login-title">Check Your Email</h2>
        
        <p style="color: #e0e0e0; margin-bottom: 30px; font-size: 15px; line-height: 1.6;">
            We've sent a verification link to your email address.<br>
            Please check your inbox (and Spam folder) and click the link to verify your account.
        </p>
        
        <a href="index.html" class="submit-btn" style="text-decoration: none; display: inline-block; width: 100%; box-sizing: border-box; text-align: center;">
            Go to Login
        </a>
        
    </div>

</body>
</html>
