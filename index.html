<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BTEC Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .toast { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); display: flex; align-items: center; gap: 12px; animation: slideIn 0.5s ease-out forwards; min-width: 300px; }
        .toast.error { border-left: 4px solid #ff4b2b; }
        .toast.success { border-left: 4px solid #00f2fe; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body>

    <div class="css-shape shape-1" style="--rot: -35deg;"></div>
    <div class="css-shape shape-2" style="--rot: 20deg;"></div>
    <div class="css-shape shape-3" style="--rot: 45deg;"></div>
    <div class="css-shape shape-4"></div>

    <div id="toast-container" class="toast-container"></div>

    <div class="glass-card">
        <div class="brand-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#4facfe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path>
                <path d="M9 14l2 2 4-4"></path>
            </svg>
            <div class="brand-text">
                <span class="title">BTEC Cloud</span>
                <span class="subtitle">IT Student Portal</span>
            </div>
            <div style="text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
    <span style="color: var(--text-muted); font-size: 14px;">Are you a Teacher?</span>
    <a href="teacher-auth.html" style="color: #00a8fc; text-decoration: none; font-weight: 600; margin-left: 5px;">
        <i class="fas fa-chalkboard-teacher"></i> Teacher Portal
    </a>
</div>
        </div>

        <h2 class="login-title">Login</h2>

        <form id="login-form" novalidate>
            <div class="input-group">
                <label>Email</label>
                <input type="text" id="login-email" placeholder="username@gmail.com">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Password">
                <i class="fas fa-eye toggle-password" id="eye-icon"></i>
                <a href="forgot-password.html" class="forgot-btn">Forgot Password?</a>
            </div>

            <button type="submit" class="submit-btn" id="login-btn">Sign in</button>
        </form>

        <div class="separator">or continue with</div>

        <div class="social-buttons">
            <button id="google-btn" class="social-btn" type="button">
                <i class="fab fa-google" style="color: #DB4437;"></i>
            </button>
            <button id="github-btn" class="social-btn" type="button">
                <i class="fab fa-github"></i>
            </button>
        </div>

        <div class="register">
            Don't have an account? <a href="register.html">Register for free</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, GithubAuthProvider, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU_rKS6aUxflVRNzFPAvxdGFSKaFHgmaE",
            authDomain: "btec-cloud-portal-d6a93.firebaseapp.com",
            projectId: "btec-cloud-portal-d6a93",
            storageBucket: "btec-cloud-portal-d6a93.firebasestorage.app",
            messagingSenderId: "230354414241",
            appId: "1:230354414241:web:b365524169fb815b449ee0",
            measurementId: "G-CVWMNZQNKQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.5s ease-in forwards';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');

            if (!email || !password) {
                return showToast("Please fill in all fields.");
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    showToast("Logged in successfully!", "success");
                    setTimeout(() => {
                        window.location.href = "dashboard.html"; 
                    }, 1000);
                })
                .catch((error) => {
                    showToast("Invalid email or password!");
                    btn.innerHTML = 'Sign in';
                    btn.disabled = false;
                });
        });

        document.getElementById('google-btn').addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).then((result) => {
                showToast("Welcome, " + result.user.displayName, "success");
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 1000);
            }).catch(() => {
                showToast("Google login failed.");
            });
        });

        document.getElementById('github-btn').addEventListener('click', () => {
            const provider = new GithubAuthProvider();
            signInWithPopup(auth, provider).then((result) => {
                showToast("Welcome, " + result.user.displayName, "success");
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 1000);
            }).catch(() => {
                showToast("GitHub login failed.");
            });
        });

        const passwordInput = document.getElementById('login-password');
        const eyeIcon = document.getElementById('eye-icon');

        eyeIcon.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
