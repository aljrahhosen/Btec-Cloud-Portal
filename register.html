<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BTEC Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* إضافة ستايل الـ Toast هنا لضمان ظهوره بشكل صحيح */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
        }

        .toast {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.5s ease-out forwards;
            min-width: 300px;
        }

        .toast.error { border-left: 4px solid #ff4b2b; }
        .toast.success { border-left: 4px solid #00f2fe; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { transform: translateX(100%); opacity: 0; }
        }

        /* إخفاء أسهم حقل الرقم الوطني */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
    </style>
</head>
<body>

    <div class="css-shape shape-1" style="--rot: -35deg;"></div>
    <div class="css-shape shape-2" style="--rot: 20deg;"></div>
    <div class="css-shape shape-3" style="--rot: 45deg;"></div>
    <div class="css-shape shape-4"></div>

    <!-- حاوية التنبيهات -->
    <div id="toast-container" class="toast-container"></div>

    <div class="glass-card">
        <div class="brand-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#4facfe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path>
                <path d="M9 14l2 2 4-4"></path>
            </svg>
            <div class="brand-text">
                <span class="title">BTEC Cloud</span>
                <span class="subtitle">IT Student Portal</span>
            </div>
        </div>

        <h2 class="login-title">Create Account</h2>
        
        <!-- novalidate تلغي تنبيهات المتصفح الافتراضية -->
        <form id="register-form" novalidate>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label>Student National ID</label>
                <input type="number" id="reg-national-id" placeholder="Enter your 10-digit ID">
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="text" id="reg-email" placeholder="student@gmail.com">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min 6 characters">
                <i class="fas fa-eye-slash toggle-password" id="reg-eye-icon"></i>
            </div>
            
            <button type="submit" class="submit-btn" id="reg-btn">Sign up</button>
        </form>

        <div class="separator" style="margin-top: 25px;">
            <a href="index.html" style="color: #4facfe; text-decoration: none; font-weight: 500; font-size: 14px;">
                <i class="fas fa-arrow-left" style="margin-right: 5px;"></i> Back to Login
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU_rKS6aUxflVRNzFPAvxdGFSKaFHgmaE",
            authDomain: "btec-cloud-portal-d6a93.firebaseapp.com",
            projectId: "btec-cloud-portal-d6a93",
            storageBucket: "btec-cloud-portal-d6a93.firebasestorage.app",
            messagingSenderId: "230354414241",
            appId: "1:230354414241:web:b365524169fb815b449ee0",
            measurementId: "G-CVWMNZQNKQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // دالة إظهار التنبيهات الاحترافية
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.5s ease-in forwards';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault(); 
            
            const name = document.getElementById('reg-name').value.trim();
            const nationalId = document.getElementById('reg-national-id').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const btn = document.getElementById('reg-btn');

            // فحص البيانات يدوياً لإظهار الـ Toasts
            if (!name) return showToast("يرجى إدخال الاسم الكامل");
            
            if (nationalId.length < 10) return showToast("الرقم الوطني يجب أن يكون 10 أرقام");

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) return showToast("يرجى إدخال إيميل صحيح");

            if (password.length < 6) return showToast("كلمة المرور يجب أن تكون 6 أحرف على الأقل");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            btn.disabled = true;

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    updateProfile(user, { displayName: name }).then(() => {
                        
                        setDoc(doc(db, "users", user.uid), {
                            fullName: name,
                            nationalId: nationalId,
                            email: email,
                            role: "Student",
                            createdAt: new Date()
                        }).then(() => {
                            
                            // إرسال إيميل التوثيق مع تحويل المستخدم لصفحة النجاح المخصصة
                            const actionCodeSettings = {
                                url: 'https://btec-cloud-portal.netlify.app/complete-verify.html',
                                handleCodeInApp: false
                            };

                            sendEmailVerification(auth.currentUser, actionCodeSettings)
                                .then(() => {
                                    window.location.href = "verify.html"; 
                                });
                                
                        });
                    });
                })
                .catch((error) => {
                    btn.innerHTML = 'Sign up';
                    btn.disabled = false;
                    if (error.code === 'auth/email-already-in-use') showToast("هذا الإيميل مسجل مسبقاً!");
                    else showToast("حدث خطأ أثناء التسجيل، حاول مرة أخرى.");
                });
        });

        // تشغيل العين للباسوورد
        const regPasswordInput = document.getElementById('reg-password');
        const regEyeIcon = document.getElementById('reg-eye-icon');
        if(regEyeIcon) {
            regEyeIcon.addEventListener('click', () => {
                const isPassword = regPasswordInput.getAttribute('type') === 'password';
                regPasswordInput.setAttribute('type', isPassword ? 'text' : 'password');
                regEyeIcon.classList.toggle('fa-eye-slash', !isPassword);
                regEyeIcon.classList.toggle('fa-eye', isPassword);
            });
        }
    </script>
</body>
</html>
