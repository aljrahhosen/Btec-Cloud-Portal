<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTEC Cloud - Teacher Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b1120; --card-bg: #131c31; --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc; --text-muted: #94a3b8; --primary: #00a8fc;
        }

        body { margin: 0; background: var(--bg-main); color: var(--text-main); font-family: 'Poppins', sans-serif; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(11, 17, 32, 0.8); border-bottom: 1px solid var(--card-border); }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 18px; color: var(--primary); }
        
        .container { max-width: 1000px; margin: 50px auto; padding: 0 20px; text-align: center; }
        
        .welcome-box { background: var(--card-bg); border: 1px solid var(--primary); border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0, 168, 252, 0.1); }
        .welcome-box h1 { margin: 0 0 10px 0; font-size: 28px; }
        .welcome-box p { color: var(--text-muted); margin-bottom: 30px; }
        
        .course-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--primary); color: white; text-decoration: none; padding: 15px 30px; border-radius: 10px; font-weight: 600; transition: 0.3s; }
        .course-btn:hover { background: #008be6; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,168,252,0.3); }

        .logout-btn { display: inline-block; margin-top: 20px; color: #ff4757; cursor: pointer; font-weight: 500; text-decoration: underline; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-chalkboard-teacher"></i> BTEC Teacher Portal</div>
    </nav>

    <div class="container">
        <div id="loading-screen">
            <i class="fas fa-spinner fa-spin" style="font-size: 40px; color: var(--primary);"></i>
            <p style="margin-top: 15px; color: var(--text-muted);">Verifying Teacher Access...</p>
        </div>

        <div id="teacher-content" class="welcome-box" style="display: none;">
            <h1>Welcome, <span id="teacher-name" style="color: var(--primary);">Teacher</span>!</h1>
            <p>Select your course below to manage student submissions and grading.</p>
            
            <a href="teacher-mohamad-course.html" class="course-btn">
                <i class="fas fa-folder-open"></i> Manage My Course
            </a>
            
            <br>
            <div class="logout-btn" id="logout-action"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU_rKS6aUxflVRNzFPAvxdGFSKaFHgmaE",
            authDomain: "btec-cloud-portal-d6a93.firebaseapp.com",
            projectId: "btec-cloud-portal-d6a93",
            storageBucket: "btec-cloud-portal-d6a93.firebasestorage.app",
            messagingSenderId: "230354414241",
            appId: "1:230354414241:web:b365524169fb815b449ee0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // جلب بيانات المستخدم من الفايربيس للتأكد من دوره
                    const userDocRef = doc(db, "Users", user.uid);
                    const docSnap = await getDoc(userDocRef);
                    
                    if (docSnap.exists() && docSnap.data().role === 'teacher') {
                        // إذا كان معلماً، أخفِ التحميل واعرض الواجهة
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('teacher-content').style.display = 'block';
                        document.getElementById('teacher-name').innerText = user.displayName || "Teacher";
                    } else {
                        // إذا كان طالباً، اطرده لصفحة الطلاب
                        window.location.href = "dashboard.html";
                    }
                } catch (error) {
                    console.error("Error verifying role:", error);
                }
            } else {
                // إذا لم يسجل دخوله أصلاً
                window.location.href = "index.html";
            }
        });

        // كود تسجيل الخروج
        document.getElementById('logout-action').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
