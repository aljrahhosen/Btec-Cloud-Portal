<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTEC Cloud - Teacher Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard-style.css?v=2">
    <style>
        html, body.dashboard-body { display: block !important; }
        .navbar { display: flex !important; width: 100% !important; margin-bottom: 30px !important; position: relative !important; }
        .nav-actions { display: flex !important; align-items: center !important; gap: 20px !important; }
        .container { display: block !important; max-width: 1200px !important; margin: 0 auto !important; }
        .brand-text-portal { font-size: 11px; color: #FFD700; background: rgba(255,215,0,0.1); padding: 2px 8px; border-radius: 6px; position: absolute; top: -10px; right: 0; }
        
        /* تأثير النقر على كرت المادة */
        .course-card { cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255, 215, 0, 0.15); }
    </style>
</head>

<body class="dashboard-body" style="display: block !important; min-height: 100vh !important; overflow-y: auto !important;">

    <nav class="navbar glass-panel" style="display: flex !important;">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
            </svg>
            Teacher Portal
        </div>
        
        <div class="nav-actions">
            <div class="dropdown-wrapper">
                <span id="lang-display">🌐 EN ▾</span>
                <div class="dropdown-menu">
                    <a href="#" class="dropdown-item" onclick="setLanguage('ar')">العربية (AR)</a>
                    <a href="#" class="dropdown-item" onclick="setLanguage('en')">English (EN)</a>
                </div>
            </div>

            <div class="dropdown-wrapper">
                <div class="profile-pic" id="profile-pic" style="border-color: #FFD700; color: #FFD700;">U</div>
                <div class="dropdown-menu">
                    <a href="profile.html" class="dropdown-item" id="profile-btn"><i class="fas fa-user"></i> My Profile</a>
                    <a href="#" class="dropdown-item" id="logout-btn" style="color:#ff4b2b; border-top: 1px solid var(--glass-border); margin-top: 5px;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="welcome-section" style="border-left-color: #FFD700;">
            <h1 id="welcome-msg">Hello, Teacher! 👋</h1>
            <p id="overview-msg">Here are the units assigned to you.</p>
        </div>

        <div class="courses-grid" id="coursesContainer"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU_rKS6aUxflVRNzFPAvxdGFSKaFHgmaE",
            authDomain: "btec-cloud-portal-d6a93.firebaseapp.com",
            projectId: "btec-cloud-portal-d6a93",
            storageBucket: "btec-cloud-portal-d6a93.firebasestorage.app",
            messagingSenderId: "230354414241",
            appId: "1:230354414241:web:b365524169fb815b449ee0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // 🌟 تحديث قاعدة بيانات المواد لتتطابق مع الروابط الديناميكية 🌟
        // ==========================================
        const courseDatabase = {
            'programming': { 
                unit_num: 5, 
                title_en: 'Introduction to Programming', 
                title_ar: 'مقدمة في البرمجة', 
                term_en: 'Semester 1', 
                term_ar: 'الفصل الأول' 
            },
            'web-design': { 
                unit_num: 7, 
                title_en: 'Introduction to Web Design', 
                title_ar: 'مقدمة في تصميم المواقع', 
                term_en: 'Semester 2', 
                term_ar: 'الفصل الثاني' 
            },
            'it-systems': { 
                unit_num: 2, 
                title_en: 'Using IT in Organizations', 
                title_ar: 'استخدام تكنولوجيا المعلومات في المؤسسات', 
                term_en: 'Semester 3', 
                term_ar: 'الفصل الثالث' 
            }
        };

        // ==========================================
        // 🌟 توزيع المواد المحدث حسب كود الأستاذ 🌟
        // ==========================================
        const teacherAssignments = {
            'MOHAMAD-T-20245': ['programming', 'web-design', 'it-systems'],
            'Musa-T-65248': [], // يمكنك إضافة مواد أخرى هنا مستقبلاً
            'HAMZA-T-54624': []
        };

        window.loadTeacherDashboard = function(teacherCode, lang) {
            const container = document.getElementById('coursesContainer');
            if(!container) return;
            container.innerHTML = ''; 

            const assignedUnitIds = teacherAssignments[teacherCode];

            if (!assignedUnitIds || assignedUnitIds.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:white; grid-column: 1/-1; padding:40px;">No courses assigned to this code.</div>`;
                return;
            }

            assignedUnitIds.forEach(unitId => {
                const data = courseDatabase[unitId];
                if (!data) return;

                const cardTitle = (lang === 'ar') ? data.title_ar : data.title_en;
                const cardSem = (lang === 'ar') ? data.term_ar : data.term_en;

                // 🌟 الرابط تم توجيهه إلى teacher-mohamad-course.html مع الـ id الديناميكي 🌟
                const courseCardHtml = `
                    <div class="course-card glass-panel teacher-card" onclick="window.location.href='teacher-mohamad-course.html?id=${unitId}'" style="border-left:4px solid #FFD700; position: relative;">
                        <div class="course-cover"></div>
                        <div class="course-content">
                            <div class="course-title" style="color: white; font-weight: 500;">${cardTitle}</div>
                            <div class="course-footer">
                                <span class="course-term" style="color: #FFD700;">${cardSem}</span>
                                <span style="font-size:10px; color:rgba(255,255,255,0.3);">Unit ${data.unit_num}</span>
                            </div>
                        </div>
                        <i class="fas fa-edit edit-icon" style="position:absolute; top:15px; right:15px; color:#FFD700; font-size:14px; background: rgba(11, 17, 32, 0.8); padding: 8px; border-radius: 6px;"></i>
                    </div>
                `;
                container.innerHTML += courseCardHtml;
            });
        };

        const translations = {
            en: { lang: "🌐 EN ▾", hello: "Hello", overview: "Here are the units assigned to you.", profile: "My Profile", logout: "Logout" },
            ar: { lang: "🌐 AR ▾", hello: "مرحباً", overview: "إليك المواد المخصصة لك لتعديلها.", profile: "حسابي", logout: "تسجيل الخروج" }
        };

        window.setLanguage = function(lang) {
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-display').innerText = translations[lang].lang;
            document.getElementById('welcome-msg').innerText = `${translations[lang].hello}, ${window.currentName}! 👋`;
            document.getElementById('overview-msg').innerText = translations[lang].overview;
            document.getElementById('profile-btn').innerHTML = `<i class="fas fa-user"></i> ${translations[lang].profile}`;
            document.getElementById('logout-btn').innerHTML = `<i class="fas fa-sign-out-alt"></i> ${translations[lang].logout}`;
            
            const urlParams = new URLSearchParams(window.location.search);
            const teacherCode = urlParams.get('code');
            window.loadTeacherDashboard(teacherCode, lang);
            
            localStorage.setItem('preferredLang', lang);
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentName = user.displayName || "Teacher";
                document.getElementById("profile-pic").innerText = window.currentName.charAt(0).toUpperCase();
                
                const urlParams = new URLSearchParams(window.location.search);
                const teacherCode = urlParams.get('code');
                
                if (!teacherCode) {
                    const userDoc = await getDoc(doc(db, "Users", user.uid));
                    if(userDoc.exists() && userDoc.data().teacherId) {
                        window.location.href = `teacher-dashboard.html?code=${userDoc.data().teacherId}`;
                        return;
                    } else {
                        window.location.href = "index.html";
                        return;
                    }
                }

                const savedLang = localStorage.getItem('preferredLang') || 'en';
                window.setLanguage(savedLang);

            } else {
                window.location.href = "index.html";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', (e) => { e.preventDefault(); signOut(auth).then(() => window.location.href = "index.html"); });
        document.querySelectorAll('.dropdown-wrapper').forEach(wrapper => { wrapper.addEventListener('click', (e) => { e.stopPropagation(); document.querySelectorAll('.dropdown-menu').forEach(menu => { if (menu !== wrapper.querySelector('.dropdown-menu')) { menu.classList.remove('show'); } }); const menu = wrapper.querySelector('.dropdown-menu'); if(menu) menu.classList.toggle('show'); }); });
        document.addEventListener('click', () => document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('show')));
    </script>
</body>
</html>
