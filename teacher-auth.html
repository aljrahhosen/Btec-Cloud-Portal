<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTEC Cloud - Teacher Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f172a; --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); --primary: #00a8fc; --primary-hover: #008be6; --text-main: #f8fafc; --text-muted: #94a3b8; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        /* خلفية فيها تأثير */
        body::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,168,252,0.1) 0%, rgba(15,23,42,1) 50%); z-index: -1; }
        
        .auth-container { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border-top: 1px solid rgba(255,255,255,0.2); }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area svg { filter: drop-shadow(0 0 10px rgba(0, 168, 252, 0.6)); margin-bottom: 10px; }
        .logo-area h2 { margin: 0; font-weight: 600; font-size: 24px; }
        .logo-area p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        html[dir="rtl"] .input-group i { left: auto; right: 15px; }
        .input-field { width: 100%; padding: 12px 15px 12px 45px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 10px; color: white; font-family: inherit; font-size: 14px; box-sizing: border-box; transition: 0.3s; }
        html[dir="rtl"] .input-field { padding: 12px 45px 12px 15px; }
        .input-field:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.4); box-shadow: 0 0 15px rgba(0,168,252,0.2); }
        .input-field::placeholder { color: #64748b; }

        .btn-auth { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.3s; font-family: inherit; margin-top: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .btn-auth:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,168,252,0.3); }

        .toggle-text { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
        .toggle-text a { color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; }
        .toggle-text a:hover { text-decoration: underline; }

        .error-msg { color: #ff4757; font-size: 13px; text-align: center; margin-top: 10px; display: none; }
        .back-student { display: block; text-align: center; margin-top: 25px; color: var(--text-muted); text-decoration: none; font-size: 13px; border-top: 1px solid var(--glass-border); padding-top: 15px; }
        .back-student:hover { color: white; }

        /* إخفاء فورم التسجيل في البداية */
        #register-form { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-area">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00a8fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
            </svg>
            <h2>Teacher Portal</h2>
            <p>BTEC Cloud Management</p>
        </div>

        <div id="error-message" class="error-msg"></div>

        <!-- فورمة تسجيل الدخول -->
        <form id="login-form">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="login-email" class="input-field" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-password" class="input-field" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-auth" id="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <div class="toggle-text">
                New Teacher? <a onclick="toggleForms()">Register Here</a>
            </div>
        </form>

        <!-- فورمة إنشاء حساب جديد -->
        <form id="register-form">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="reg-name" class="input-field" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="reg-email" class="input-field" placeholder="Email Address" required>
            </div>
            <!-- هون اللعبة: Teacher ID -->
            <div class="input-group">
                <i class="fas fa-id-badge" style="color: #FFD700;"></i>
                <input type="text" id="reg-teacher-id" class="input-field" placeholder="Teacher Verification ID" required style="border-color: rgba(255, 215, 0, 0.5);">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="reg-password" class="input-field" placeholder="Password (Min 6 chars)" required>
            </div>
            <button type="submit" class="btn-auth" id="reg-btn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
            <div class="toggle-text">
                Already have an account? <a onclick="toggleForms()">Login</a>
            </div>
        </form>

        <a href="index.html" class="back-student"><i class="fas fa-arrow-left"></i> Back to Student Login</a>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        // ضفنا مكتبات الـ Firestore عشان الداتابيز
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU_rKS6aUxflVRNzFPAvxdGFSKaFHgmaE",
            authDomain: "btec-cloud-portal-d6a93.firebaseapp.com",
            projectId: "btec-cloud-portal-d6a93",
            storageBucket: "btec-cloud-portal-d6a93.firebasestorage.app",
            messagingSenderId: "230354414241",
            appId: "1:230354414241:web:b365524169fb815b449ee0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const errorDiv = document.getElementById('error-message');

        window.toggleForms = function() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            errorDiv.style.display = 'none';
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        };

        function showError(msg) {
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
        }

        // ==========================================
        // 1. نظام تسجيل دخول المعلم
        // ==========================================
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
            
            signInWithEmailAndPassword(auth, email, pass)
                .then(async (userCredential) => {
                    // عشان نضمن إنه أستاذ، بنشيك إذا إله ملف في داتابيز الأساتذة
                    const userDoc = await getDoc(doc(db, "Users", userCredential.user.uid));
                    if(userDoc.exists() && userDoc.data().role === 'teacher') {
                        window.location.href = "teacher-dashboard.html"; // صفحة الأستاذ اللي حكيتلي عنها
                    } else {
                        auth.signOut();
                        showError("Access Denied: You are not registered as a teacher.");
                        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    }
                })
                .catch((error) => {
                    showError(error.message);
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                });
        });

        // ==========================================
        // 2. نظام إنشاء حساب المعلم (مع فحص الكود)
        // ==========================================
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const teacherId = document.getElementById('reg-teacher-id').value; // الكود السري
            const pass = document.getElementById('reg-password').value;
            const btn = document.getElementById('reg-btn');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying ID...';
            errorDiv.style.display = 'none';

            try {
                // 1. فحص كود الأستاذ في داتابيز TeacherCodes
                const codeRef = doc(db, "TeacherCodes", teacherId);
                const codeSnap = await getDoc(codeRef);

                if (!codeSnap.exists()) {
                    showError("Invalid Teacher ID! Please contact administration.");
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                    return;
                }

                if (codeSnap.data().used === true) {
                    showError("This Teacher ID has already been used to create an account.");
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                    return;
                }

                // 2. الكود صحيح ومش مستخدم -> بنعمل الحساب
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 3. بنحدث اسم الأستاذ
                await updateProfile(user, { displayName: name });

                // 4. بنسجل إنه هاد اليوزر "أستاذ" في داتابيز الـ Users
                await setDoc(doc(db, "Users", user.uid), {
                    name: name,
                    email: email,
                    role: "teacher",
                    teacherId: teacherId
                });

                // 5. بنحرق الكود عشان ما حدا يقدر يستخدمه مرة ثانية (used: true)
                await updateDoc(codeRef, { used: true });

                // 6. توجيه لصفحة الأستاذ
                window.location.href = "teacher-dashboard.html";

            } catch (error) {
                showError(error.message);
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });
    </script>
</body>
</html>
