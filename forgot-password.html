<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <!-- أيقونة الموقع (Favicon) -->
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - BTEC Cloud</title>
    
    <!-- استدعاء الأيقونات والخطوط -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* نظام التنبيهات الزجاجي - Toasts */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
        }

        .toast {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.5s ease-out forwards;
            min-width: 300px;
        }

        .toast.error { border-left: 4px solid #ff4b2b; }
        .toast.success { border-left: 4px solid #00f2fe; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- الأشكال الخلفية -->
    <div class="css-shape shape-1" style="--rot: -35deg;"></div>
    <div class="css-shape shape-2" style="--rot: 20deg;"></div>
    <div class="css-shape shape-3" style="--rot: 45deg;"></div>
    <div class="css-shape shape-4"></div>

    <!-- حاوية التنبيهات -->
    <div id="toast-container" class="toast-container"></div>

    <div class="glass-card">
        
        <!-- اللوجو -->
        <div class="brand-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#4facfe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path>
                <path d="M9 14l2 2 4-4"></path>
            </svg>
            <div class="brand-text">
                <span class="title">BTEC Cloud</span>
                <span class="subtitle">IT Student Portal</span>
            </div>
        </div>

        <h2 class="login-title">Reset Password</h2>
        
        <p style="font-size: 13px; color: #ddd; margin-bottom: 25px; line-height: 1.6; text-align: center;">
            Enter your email address below and we'll send you a link to reset your password.
        </p>

        <!-- تم إضافة id و novalidate -->
        <form id="reset-form" novalidate>
            <div class="input-group">
                <label>Email Address</label>
                <!-- تغيير النوع لـ text للتحقق اليدوي -->
                <input type="text" id="reset-email" placeholder="username@gmail.com">
            </div>
            
            <button type="submit" class="submit-btn" id="reset-btn">Send Reset Link</button>
        </form>

        <div class="separator" style="margin-top: 35px;">
            <a href="index.html" style="color: #4facfe; text-decoration: none; font-weight: 500; font-size: 14px;">
                <i class="fas fa-arrow-left" style="margin-right: 5px;"></i> Back to Login
            </a>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU_rKS6aUxflVRNzFPAvxdGFSKaFHgmaE",
            authDomain: "btec-cloud-portal-d6a93.firebaseapp.com",
            projectId: "btec-cloud-portal-d6a93",
            storageBucket: "btec-cloud-portal-d6a93.firebasestorage.app",
            messagingSenderId: "230354414241",
            appId: "1:230354414241:web:b365524169fb815b449ee0",
            measurementId: "G-CVWMNZQNKQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // دالة إظهار التنبيهات
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.5s ease-in forwards';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        document.getElementById('reset-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-email').value.trim();
            const btn = document.getElementById('reset-btn');

            // فحص الإيميل يدوياً
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                return showToast("يرجى إدخال بريد إلكتروني صحيح");
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;

            // إعدادات التوجيه بعد تغيير الباسوورد
            const actionCodeSettings = {
                url: 'https://btec-cloud-portal.vercel.app/index.html',
                handleCodeInApp: false
            };

            sendPasswordResetEmail(auth, email, actionCodeSettings)
                .then(() => {
                    showToast("تم إرسال رابط إعادة التعيين بنجاح!", "success");
                    btn.innerHTML = 'Sent!';
                    // التوجيه لصفحة الدخول بعد 3 ثواني
                    setTimeout(() => { window.location.href = "index.html"; }, 3500);
                })
                .catch((error) => {
                    btn.innerHTML = 'Send Reset Link';
                    btn.disabled = false;
                    if (error.code === 'auth/user-not-found') {
                        showToast("هذا الإيميل غير مسجل لدينا.");
                    } else {
                        showToast("حدث خطأ، حاول مرة أخرى لاحقاً.");
                    }
                });
        });
    </script>
</body>
</html>
